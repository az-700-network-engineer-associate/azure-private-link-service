name: Terraform Bootstrap + Deploy

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}

jobs:
  # 🧱 1) BOOTSTRAP (runs once or idempotent)
  bootstrap-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: az-700-network-engineer-associate/terraform-az700-networking
          token: ${{ secrets.TF_REPO_TOKEN }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Terraform Init (bootstrap)
        working-directory: bootstrap
        run: terraform init -backend=false

      - name: Terraform Apply (bootstrap)
        working-directory: bootstrap
        run: terraform apply -auto-approve


      - name: Migrate state to backend
        working-directory: bootstrap
        run: |
          terraform init -migrate-state \
            -backend-config="resource_group_name=rg-pls-bootstrap-dev" \
            -backend-config="storage_account_name=storageacttfstatedev" \
            -backend-config="container_name=tf-state-pls-dev" \
            -backend-config="key=bootstrap.tfstate"